<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    Asylum app icon. Three parallel pill "lanes" — a fleet of agents running in
    parallel — in the brand accents (cyan / amber / mint) on a dark squircle.
    Regenerate the raster/.icns from this with packaging/icon.sh.
  -->
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#151a22"/>
      <stop offset="1" stop-color="#0b0d10"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.14" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Squircle body (rounded rect approximation, Apple ~0.2237 corner ratio). -->
  <rect x="88" y="88" width="848" height="848" rx="190" ry="190" fill="url(#body)"/>
  <rect x="88" y="88" width="848" height="848" rx="190" ry="190" fill="url(#sheen)"/>
  <rect x="89.5" y="89.5" width="845" height="845" rx="188.5" ry="188.5"
        fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3"/>

  <!-- Three parallel agent lanes, pill-capped, at varying heights. -->
  <g>
    <rect x="277" y="460" width="110" height="300" rx="55" ry="55" fill="#33d6ff"/>
    <rect x="457" y="320" width="110" height="440" rx="55" ry="55" fill="#ffb347"/>
    <rect x="637" y="392" width="110" height="368" rx="55" ry="55" fill="#80f0c0"/>
  </g>
</svg>
