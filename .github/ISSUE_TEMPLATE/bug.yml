name: Bug report
description: Report a bug or defect
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below to help us diagnose and fix it.

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear description of what went wrong.
      placeholder: When I clicked X, the app crashed instead of...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: What should have happened instead.
      placeholder: The diff should show the changes...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug.
      placeholder: |
        1. Create a new project
        2. Run a task with two agents
        3. Click on the diff for the first run
        4. (the bug occurs here)
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: What OS are you running?
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x64)
        - Linux (ARM64)
        - Windows (x64)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Asylum version
      description: "Run `asylum --version` or check Help → About"
      placeholder: "0.1.3 or asylumdev (dev build)"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log file
      description: |
        Paste the relevant log lines. To find the log folder: Help → Open Log Folder (macOS/Linux: `~/.local/share/asylum/logs/`, Windows: `%APPDATA%\asylum\logs\`).
        You can also run `asylum logs show` from the CLI.
      placeholder: |
        [2024-12-01T10:23:45] ERROR app::diff: failed to parse unified diff
        ...

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other details that might help (screenshots, terminal output, etc.).
