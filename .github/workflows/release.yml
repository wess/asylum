name: Release

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      # Release when the workspace version has no matching tag yet. Idempotent
      # for both push and manual dispatch (a HEAD~1 diff would miss dispatches
      # and re-released versions).
      - name: Read workspace version
        id: version
        run: |
          VERSION=$(sed -n 's/^version = "\([0-9][^"]*\)".*/\1/p' Cargo.toml | head -1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Decide whether to release
        id: diff
        run: |
          NEW="${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/v${NEW}" | grep -q .; then
            echo "v${NEW} already released — skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # The release gate. `ci.yml` also runs on pushes to main, but it is a separate
  # workflow: nothing makes the release wait for it, so a red suite would still
  # tag and publish. Re-running the gates here is the only thing that actually
  # blocks a broken release, and a tag is forever.
  verify:
    name: verify (fmt, clippy, test)
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v7

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # Kept in step with ci.yml. Note `libxkbcommon-x11-dev`: clippy never
      # links, so a missing link-time library only surfaces when the test
      # binaries are linked.
      - name: Linux build deps (gpui)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            libasound2-dev \
            libfontconfig-dev \
            libgtk-3-dev \
            libssl-dev \
            libvulkan1 \
            libwayland-dev \
            libwebkit2gtk-4.1-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy (warnings denied)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  create-release:
    runs-on: ubuntu-latest
    needs: [check-version, verify]
    if: needs.check-version.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v7

      - name: Create git tag
        run: |
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      # Draft until every platform's artifacts are uploaded (see `publish`).
      # The tag and release are created before the builds run, so publishing
      # here would put an empty release in front of users for the length of a
      # build - or permanently, if a build fails.
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.check-version.outputs.version }}"
          generate_release_notes: true
          draft: true

  build:
    needs: [check-version, create-release]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: macos-latest
    # Signing is optional: with a Developer ID the app is signed with a hardened
    # runtime and the dmg is notarized. Without the secrets the bundle ships
    # genuinely unsigned - Gatekeeper on macOS 15+ refuses it, and Control-click
    # -> Open no longer bypasses that, so a user has to clear the quarantine
    # attribute by hand. `signed` reports which of the two actually happened, so
    # the release notes and the cask describe the artifact rather than guess.
    outputs:
      signed: ${{ steps.verify.outputs.signed }}
    env:
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      AC_USERNAME: ${{ secrets.AC_USERNAME }}
      AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
      AC_TEAM_ID: ${{ secrets.AC_TEAM_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: "v${{ needs.check-version.outputs.version }}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Bundle Asylum.app
        working-directory: crates/app
        run: cargo bundle --release --format osx --target aarch64-apple-darwin

      - name: Package + sign + notarize .dmg
        run: |
          packaging/macos.sh aarch64-apple-darwin macos-arm64
          mv dist/asylum-macos-arm64.dmg dist/Asylum.dmg

      - name: Verify bundle
        id: verify
        run: |
          app="target/aarch64-apple-darwin/release/bundle/osx/Asylum.app"
          test -x "$app/Contents/MacOS/asylum" || test -x "$app/Contents/MacOS/asylumdev"
          if [ -z "${MACOS_SIGN_IDENTITY}" ]; then
            echo "::warning::Unsigned build - Gatekeeper will block it on install; the release notes carry the workaround."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # A signed build that fails verification must not ship, so no `|| true`.
          codesign --verify --strict --verbose=2 "$app"
          # The dmg is the thing users download, and a stapled ticket is the only
          # proof notarization actually landed. Claiming it on the strength of the
          # identity alone is how release notes end up telling people to strip the
          # quarantine flag from an app that never needed it.
          if xcrun stapler validate dist/Asylum.dmg; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Signed but not notarized - the release notes carry the Gatekeeper workaround."
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload DMG
        run: gh release upload "v${{ needs.check-version.outputs.version }}" dist/Asylum.dmg --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  build-linux:
    needs: [check-version, create-release]
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: "v${{ needs.check-version.outputs.version }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            curl \
            desktop-file-utils \
            file \
            libasound2-dev \
            libfontconfig-dev \
            libgtk-3-dev \
            libssl-dev \
            libvulkan1 \
            libwayland-dev \
            libwebkit2gtk-4.1-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build + package
        run: packaging/linux.sh ${{ matrix.arch }}

      - name: Upload to release
        run: gh release upload "v${{ needs.check-version.outputs.version }}" dist/linux/*.tar.gz dist/linux/*.deb dist/linux/*.AppImage --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  # Every artifact is uploaded and every build is green: flip the draft live.
  # Nothing downstream (casks, manifests) can resolve a public download URL
  # before this runs, so this job is what makes the release real.
  publish:
    runs-on: ubuntu-latest
    needs: [check-version, build, build-linux, build-windows]
    if: needs.check-version.outputs.changed == 'true'
    steps:
      # Every line stays indented inside this block scalar on purpose: an
      # unindented `---` would read as a YAML document separator and silently
      # drop every job defined below this one.
      - name: Note install caveats
        run: |
          V="${{ needs.check-version.outputs.version }}"
          BODY=$(gh release view "v${V}" --repo "${{ github.repository }}" --json body -q .body)
          if [ "${SIGNED}" = "true" ]; then
            MAC=$(printf '%s\n' \
              '**macOS** - signed and notarized: download the `.dmg`, drag Asylum to' \
              'Applications, and open it. No quarantine workaround is needed.')
          else
            MAC=$(printf '%s\n' \
              '**macOS** - this build is not signed or notarized, so Gatekeeper will' \
              'refuse to open it, and on macOS 15+ the Control-click -> Open trick no' \
              'longer works. Open **System Settings -> Privacy & Security** and choose' \
              '**Open Anyway**, or clear the quarantine flag directly:' \
              '' \
              '```sh' \
              'xattr -dr com.apple.quarantine /Applications/Asylum.app' \
              '```')
          fi
          NOTE=$(printf '%s\n' \
            '' \
            '---' \
            '' \
            '### Installing' \
            '' \
            "${MAC}" \
            '' \
            '**Windows** - builds are beta and unsigned; SmartScreen will warn about' \
            'an unknown publisher. The `.zip` is the guaranteed deliverable.')
          case "${BODY}" in
            *"### Installing"*)
              echo "Release notes already carry the install caveats."
              ;;
            *)
              gh release edit "v${V}" --repo "${{ github.repository }}" \
                --notes "${BODY}${NOTE}"
              ;;
          esac
        env:
          GH_TOKEN: ${{ github.token }}
          SIGNED: ${{ needs.build.outputs.signed }}

      - name: Publish the release
        run: |
          gh release edit "v${{ needs.check-version.outputs.version }}" \
            --repo "${{ github.repository }}" --draft=false
        env:
          GH_TOKEN: ${{ github.token }}

  update-homebrew:
    runs-on: ubuntu-latest
    needs: [check-version, build, publish]
    if: needs.check-version.outputs.changed == 'true'
    # A missing HOMEBREW_TAP_TOKEN (or tap repo) must not fail a release that
    # has already published its artifacts - the cask can be refreshed by hand.
    continue-on-error: true
    steps:
      - name: Download DMG and compute SHA
        id: shas
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          URL="https://github.com/wess/asylum/releases/download/v${VERSION}/Asylum.dmg"
          for i in $(seq 1 30); do
            if curl -fsSL -o /tmp/Asylum.dmg "${URL}" 2>/dev/null; then
              break
            fi
            echo "Waiting for Asylum.dmg... ($i/30)"
            sleep 10
          done
          SHA=$(sha256sum /tmp/Asylum.dmg | cut -d' ' -f1)
          echo "sha_darwin_arm64=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v7
        with:
          repository: wess/homebrew-packages
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update cask
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          mkdir -p tap/Casks
          cat > tap/Casks/asylum.rb << 'RUBY'
          cask "asylum" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA_DARWIN_ARM64_PLACEHOLDER"

            url "https://github.com/wess/asylum/releases/download/v#{version}/Asylum.dmg"
            name "Asylum"
            desc "Agent Development Environment: run a fleet of AI coding agents in parallel"
            homepage "https://github.com/wess/asylum"

            depends_on arch: :arm64
            depends_on macos: :big_sur

            app "Asylum.app"

            zap trash: [
              "~/Library/Application Support/Asylum",
              "~/Library/Preferences/dev.asylum.app.plist",
              "~/.config/asylum",
            ]
          end
          RUBY
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" tap/Casks/asylum.rb
          sed -i "s/SHA_DARWIN_ARM64_PLACEHOLDER/${{ steps.shas.outputs.sha_darwin_arm64 }}/g" tap/Casks/asylum.rb
          # Gatekeeper caveats belong only on a build that actually needs them.
          # Telling someone to strip the quarantine attribute off a notarized app
          # trains them to defeat the check that was protecting them.
          if [ "${SIGNED}" != "true" ]; then
            python3 - << 'PY'
          path = "tap/Casks/asylum.rb"
          caveats = '''
            caveats <<~EOS
              This build is not signed or notarized, so Gatekeeper will refuse to
              open it. Either open System Settings -> Privacy & Security and
              choose "Open Anyway", or clear the quarantine flag:

                xattr -dr com.apple.quarantine "#{appdir}/Asylum.app"
            EOS
          '''
          body = open(path).read().rstrip()
          assert body.endswith("end"), "cask does not end with `end`; refusing to patch"
          open(path, "w").write(body[:-3] + caveats + "end\n")
          PY
          fi
        env:
          SIGNED: ${{ needs.build.outputs.signed }}

      - name: Push updated cask
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/asylum.rb
          if git diff --cached --quiet; then
            echo "Cask unchanged — skipping push."
          else
            git commit -m "Update asylum to v${{ needs.check-version.outputs.version }}"
            git push
          fi

  # Windows is beta: artifacts are compile/link-verified in CI but not yet
  # runtime-tested, and the MSI is unsigned. See packaging/readme.md.
  build-windows:
    needs: [check-version, create-release]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: "v${{ needs.check-version.outputs.version }}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build + package (.zip + .msi)
        shell: pwsh
        run: packaging/windows.ps1 -Arch x86_64

      - name: Pack Chocolatey (.nupkg)
        shell: pwsh
        run: |
          $version = "${{ needs.check-version.outputs.version }}"
          $zip = "dist/windows/asylum-$version-windows-x86_64.zip"
          $sha = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          (Get-Content packaging/chocolatey/asylum.nuspec) -replace '0\.0\.0', $version |
            Set-Content packaging/chocolatey/asylum.nuspec
          (Get-Content packaging/chocolatey/tools/chocolateyinstall.ps1) -replace '0\.0\.0', $version -replace '0{64}', $sha |
            Set-Content packaging/chocolatey/tools/chocolateyinstall.ps1
          choco pack packaging/chocolatey/asylum.nuspec --outputdirectory dist/windows

      - name: Upload to release
        shell: pwsh
        run: |
          $v = "${{ needs.check-version.outputs.version }}"
          $assets = Get-ChildItem -Path dist/windows/* -Include *.zip, *.msi, *.nupkg
          gh release upload "v$v" $assets.FullName --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  # Refresh the in-repo Scoop manifest with the released zip's URL + SHA-256.
  # Non-fatal: if pushing to a protected main is blocked, the release still
  # succeeds and the manifest can be updated by hand (see packaging/readme.md).
  update-scoop:
    runs-on: ubuntu-latest
    needs: [check-version, publish]
    if: needs.check-version.outputs.changed == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Update Scoop manifest
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          URL="https://github.com/wess/asylum/releases/download/v${VERSION}/asylum-${VERSION}-windows-x86_64.zip"
          for i in $(seq 1 30); do
            if curl -fsSL -o /tmp/p.zip "${URL}" 2>/dev/null; then break; fi
            echo "Waiting for windows zip... ($i/30)"; sleep 10
          done
          SHA=$(sha256sum /tmp/p.zip | cut -d' ' -f1)
          python3 - "$VERSION" "$SHA" << 'PY'
          import json, sys
          version, sha = sys.argv[1], sys.argv[2]
          path = "packaging/scoop/asylum.json"
          with open(path) as f:
              m = json.load(f)
          m["version"] = version
          a = m["architecture"]["64bit"]
          a["url"] = f"https://github.com/wess/asylum/releases/download/v{version}/asylum-{version}-windows-x86_64.zip"
          a["hash"] = sha
          a["extract_dir"] = f"asylum-{version}-windows-x86_64"
          with open(path, "w") as f:
              json.dump(m, f, indent=4)
              f.write("\n")
          PY

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/scoop/asylum.json
          if git diff --cached --quiet; then
            echo "Scoop manifest unchanged."
            exit 0
          fi
          git commit -m "Update Scoop manifest to v${{ needs.check-version.outputs.version }}"
          # This job starts at the release commit but lands minutes later, after
          # the platform builds - main has usually moved on by then, and a plain
          # push loses the race. Rebase onto whatever arrived and retry; the
          # manifest is machine-written, so there is nothing to conflict over.
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt ${i}/3) - rebasing onto origin/main."
            git pull --rebase origin main || exit 1
          done
          echo "::warning::Could not push the Scoop manifest after 3 attempts; update it by hand."
          exit 1
