name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macos-arm64
            target: aarch64-apple-darwin
            bundle: osx
          - os: macos-13
            label: macos-x64
            target: x86_64-apple-darwin
            bundle: osx
          - os: ubuntu-latest
            label: linux-x64
            target: x86_64-unknown-linux-gnu
            bundle: deb
    steps:
      - uses: actions/checkout@v7

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Linux build deps
        if: matrix.bundle == 'deb'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libxcb1-dev \
            libxkbcommon-dev libssl-dev libwayland-dev

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Bundle
        working-directory: crates/app
        run: cargo bundle --release --format ${{ matrix.bundle }} --target ${{ matrix.target }}

      # Package the macOS .app into a .dmg. Signing/notarization run only when
      # the signing secrets are present, so forks and untagged runs still build.
      - name: Package macOS dmg
        if: matrix.bundle == 'osx'
        run: bash packaging/macos.sh "${{ matrix.target }}" "${{ matrix.label }}"
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}

      - name: Collect Linux artifact
        if: matrix.bundle == 'deb'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bundle/deb/*.deb dist/asylum-${{ matrix.label }}.deb

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.label }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
