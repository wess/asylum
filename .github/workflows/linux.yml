name: Linux Build

# Validation build for the Linux artifacts. Runs on demand and on PRs that
# touch the build, so the cross-platform compile and packaging are exercised
# without cutting a release. Artifacts are uploaded to the run for download.
on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "assets/asylum.desktop"
      - "packaging/linux.sh"
      - ".github/workflows/linux.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      # Mirrors the dependency list in release.yml's build-linux job; the two
      # install the same set so a green run here means a green release build.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            curl \
            file \
            desktop-file-utils \
            libgtk-3-dev \
            libssl-dev \
            libwayland-dev \
            libwebkit2gtk-4.1-dev \
            libxcb1-dev \
            libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build + package
        run: packaging/linux.sh ${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: asylum-linux-${{ matrix.arch }}
          path: dist/linux/*
          if-no-files-found: error
