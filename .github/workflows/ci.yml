name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # Kept in step with release.yml's `verify` and `build-linux` jobs. Note
      # `libxkbcommon-x11-dev`: clippy never links, so a missing link-time
      # library only surfaces when the test binaries are linked.
      - name: Linux build deps (gpui)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            libasound2-dev \
            libfontconfig-dev \
            libgtk-3-dev \
            libssl-dev \
            libvulkan1 \
            libwayland-dev \
            libwebkit2gtk-4.1-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy (warnings denied)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  audit:
    name: cargo audit (advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  site:
    name: site (typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build
